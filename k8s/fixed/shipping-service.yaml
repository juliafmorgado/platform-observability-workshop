apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  namespace: meridian
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipping-service
  template:
    metadata:
      labels:
        app: shipping-service
    spec:
      containers:
        - name: shipping-service
          image: meridian/shipping-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
          # Still no OTel env vars — the Dash0 operator will inject instrumentation automatically
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: meridian
spec:
  selector:
    app: shipping-service
  ports:
    - port: 3002
      targetPort: 3002
