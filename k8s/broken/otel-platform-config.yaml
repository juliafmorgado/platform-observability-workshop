apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-platform-config
  namespace: meridian
data:
  # BUG 1: protocol/port mismatch — http/protobuf to the gRPC port (:4317)
  # the connection succeeds, but spans are rejected at the protocol layer, silently
  OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  # BUG 2: OTEL_RESOURCE_ATTRIBUTES is absent — no service.version or deployment.environment on any span
